<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>History — Library Management System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="top-navbar">
    <a href="dashboard.html" class="navbar-brand-text">
      <div class="brand-icon">📚</div>
      LibraryMS
    </a>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link-item">🏠 Dashboard</a>
      <a href="books.html" class="nav-link-item">📖 Books</a>
      <a href="add-book.html" class="nav-link-item">➕ Add Book</a>
      <a href="issue-book.html" class="nav-link-item">📤 Issue Book</a>
      <a href="history.html" class="nav-link-item active">📋 History</a>
    </div>
    <div class="nav-right">
      <span style="color:rgba(255,255,255,0.6);font-size:0.85rem;">👤 Admin</span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="page-header fade-in">
      <h1 class="page-title">Issue History</h1>
      <p class="page-subtitle">Complete record of all book issues and returns</p>
    </div>

    <div class="section-card fade-in-1">
      <div class="section-card-header">
        <div class="section-card-title">📋 All Records</div>
      </div>
      <div class="table-container">
        <table class="table-custom">
          <thead>
            <tr>
              <th>Book Name</th>
              <th>Issued To</th>
              <th>Issue Date</th>
              <th>Return Date</th>
              <th>Returned On</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="history-tbody">
            <tr><td colspan="7" class="text-center text-muted py-4">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>loadHistory();</script>
</body>
</html>
