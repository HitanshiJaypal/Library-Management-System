<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Book — Library Management System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="top-navbar">
    <a href="dashboard.html" class="navbar-brand-text">
      <div class="brand-icon">📚</div>
      LibraryMS
    </a>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link-item">🏠 Dashboard</a>
      <a href="books.html" class="nav-link-item">📖 Books</a>
      <a href="add-book.html" class="nav-link-item active">➕ Add Book</a>
      <a href="issue-book.html" class="nav-link-item">📤 Issue Book</a>
      <a href="history.html" class="nav-link-item">📋 History</a>
    </div>
    <div class="nav-right">
      <span style="color:rgba(255,255,255,0.6);font-size:0.85rem;">👤 Admin</span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="page-header fade-in">
      <h1 class="page-title">Add New Book</h1>
      <p class="page-subtitle">Fill in the details below to add a book to the library</p>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-8">
        <div class="section-card fade-in-1">
          <div class="section-card-header">
            <div class="section-card-title">📘 Book Information</div>
          </div>
          <div class="section-card-body">

            <!-- Alert -->
            <div id="add-alert" class="alert-custom" style="display:none;"></div>

            <form id="add-book-form" onsubmit="handleAddBook(event)">
              <div class="mb-3">
                <label class="form-label-custom">Book Name <span style="color:#ef4444;">*</span></label>
                <input type="text" id="book-name" class="form-control-custom" placeholder="e.g. Atomic Habits"/>
              </div>

              <div class="mb-3">
                <label class="form-label-custom">Author <span style="color:#ef4444;">*</span></label>
                <input type="text" id="book-author" class="form-control-custom" placeholder="e.g. James Clear"/>
              </div>

              <div class="mb-4">
                <label class="form-label-custom">Category <span style="color:#ef4444;">*</span></label>
                <select id="book-category" class="form-control-custom">
                  <option value="">— Select Category —</option>
                  <option>Fiction</option>
                  <option>Science</option>
                  <option>Technology</option>
                  <option>Self Improvement</option>
                  <option>Psychology</option>
                </select>
              </div>

              <div style="display:flex;gap:10px;">
                <button type="submit" class="btn-primary-custom">➕ Add Book</button>
                <a href="books.html" class="btn-outline-custom">Cancel</a>
              </div>
            </form>

          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>requireLogin();</script>
</body>
</html>
