<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Library Management System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="login-body">

  <!-- Decorative background shapes -->
  <div class="login-bg-shapes">
    <span></span><span></span><span></span>
  </div>

  <div class="login-card fade-in">
    <!-- Logo -->
    <div class="login-logo">📚</div>
    <h1 class="login-title">Library System</h1>
    <p class="login-sub">Sign in to manage your library</p>

    <!-- Error alert -->
    <div id="login-error" class="alert-custom alert-danger-custom" style="display:none;">
      ❌ Invalid username or password.
    </div>

    <!-- Login Form -->
    <form onsubmit="handleLogin(event)">
      <div class="mb-3">
        <label class="form-label-custom">Username</label>
        <input type="text" id="username" class="form-control-custom" placeholder="Enter username" autocomplete="off"/>
      </div>
      <div class="mb-4">
        <label class="form-label-custom">Password</label>
        <input type="password" id="password" class="form-control-custom" placeholder="Enter password"/>
      </div>
      <button type="submit" class="btn-primary-custom w-100" style="justify-content:center;">
        🔑 Sign In
      </button>
    </form>

    <div style="text-align:center;margin-top:1.5rem;padding:10px;background:#f8fafc;border-radius:8px;">
      <small style="color:#64748b;font-size:0.8rem;">
       
      </small>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>
    // Redirect if already logged in
    if (isLoggedIn()) window.location.href = 'dashboard.html';
  </script>
</body>
</html>
