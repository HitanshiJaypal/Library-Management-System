<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Books — Library Management System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="top-navbar">
    <a href="dashboard.html" class="navbar-brand-text">
      <div class="brand-icon">📚</div>
      LibraryMS
    </a>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link-item">🏠 Dashboard</a>
      <a href="books.html" class="nav-link-item active">📖 Books</a>
      <a href="add-book.html" class="nav-link-item">➕ Add Book</a>
      <a href="issue-book.html" class="nav-link-item">📤 Issue Book</a>
      <a href="history.html" class="nav-link-item">📋 History</a>
    </div>
    <div class="nav-right">
      <span style="color:rgba(255,255,255,0.6);font-size:0.85rem;">👤 Admin</span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="page-header fade-in" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
      <div>
        <h1 class="page-title">All Books</h1>
        <p class="page-subtitle">Manage and view all books in the library</p>
      </div>
      <a href="add-book.html" class="btn-primary-custom fade-in">➕ Add New Book</a>
    </div>

    <!-- Search / Filter / Sort -->
    <div class="search-filter-bar fade-in-1">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" class="form-control-custom" placeholder="Search by book name or author..." oninput="renderBooksTable()"/>
      </div>
      <select id="filter-category" class="form-control-custom" style="max-width:200px;" onchange="renderBooksTable()">
        <option value="">All Categories</option>
        <option>Fiction</option>
        <option>Science</option>
        <option>Technology</option>
        <option>Self Improvement</option>
        <option>Psychology</option>
      </select>
      <select id="sort-select" class="form-control-custom" style="max-width:180px;" onchange="renderBooksTable()">
        <option value="">Sort By</option>
        <option value="name">Book Name (A–Z)</option>
        <option value="author">Author (A–Z)</option>
      </select>
    </div>

    <!-- Books Table -->
    <div class="section-card fade-in-2">
      <div class="table-container">
        <table class="table-custom">
          <thead>
            <tr>
              <th>Book Name</th>
              <th>Author</th>
              <th>Category</th>
              <th>Status</th>
              <th>Issued To</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="books-tbody">
            <tr><td colspan="6" class="text-center text-muted py-4">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>loadBooks();</script>
</body>
</html>
